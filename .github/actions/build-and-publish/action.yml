name: Build and publish image
description: Build, test, publish, and attest the application image

inputs:
  image:
    description: Full image repository name without tag
    required: true
  base-image:
    description: Base image used when building the Docker image
    required: true
  github-token:
    description: GitHub token used for Gradle/GPR access
    required: true
  team:
    description: NAIS team used for registry login
    required: true
  java-version:
    description: Java version to install
    required: false
    default: "26"
  cosign-release:
    description: Cosign release to install
    required: false
    default: "v2.4.1"

outputs:
  image:
    description: Fully qualified image reference including tag
    value: ${{ steps.build.outputs.image }}

runs:
  using: composite
  steps:
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Install Java ${{ inputs.java-version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: temurin

    - name: Installer cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        cosign-release: ${{ inputs.cosign-release }}

    - name: Setter tag-navn
      shell: bash
      run: echo "TAG=$(date +%Y.%m.%d.%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

    - name: Login GAR
      uses: nais/login@d6ab5d83f735e9f155eb9d7d29cd20ae46820ea9 # v0
      with:
        team: ${{ inputs.team }}

    - name: Configure Gradle for GPR
      shell: bash
      run: |
        mkdir -p ~/.gradle
        echo "gpr.user=${GITHUB_ACTOR}" >> ~/.gradle/gradle.properties
        echo "gpr.key=${{ inputs.github-token }}" >> ~/.gradle/gradle.properties

    - name: Test og bygg
      id: build
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        BASE: ${{ inputs.base-image }}
        ORG_GRADLE_PROJECT_githubUser: x-access-token
        ORG_GRADLE_PROJECT_githubPassword: ${{ inputs.github-token }}
      run: |
        echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
        ./gradlew --warning-mode all test cyclonedxBom bootJar jacocoTestReport
        docker build --build-arg BASE_IMAGE=${BASE} -t ${IMAGE}:${TAG} -t ${IMAGE}:latest .
        docker push ${IMAGE}:${TAG}
        docker push ${IMAGE}:latest
        echo "DIGEST=$(docker buildx imagetools inspect ${IMAGE}:${TAG} --format '{{.Manifest.Digest}}')" >> "$GITHUB_ENV"

    - name: Prepare test report bundle
      shell: bash
      run: |
        echo "--- JaCoCo report ---"
        ls build/reports/jacoco/test/html/ || echo "Missing JaCoCo report"
        echo "--- Test report ---"
        ls build/reports/tests/test/ || echo "Missing test report"
        mkdir -p build/reports/pages/jacoco
        mkdir -p build/reports/pages/tests
        cp -r build/reports/jacoco/test/html/. build/reports/pages/jacoco/
        cp -r build/reports/tests/test/. build/reports/pages/tests/
        cat > build/reports/pages/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <body>
        <h1>Test & Coverage</h1>
        <ul>
         <li><a href="jacoco/index.html">JaCoCo Coverage</a></li>
         <li><a href="tests/index.html">Test Report</a></li>
        </ul>
        </body>
        </html>
        EOF

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Attest and sign
      uses: nais/attest-sign@47aaa4acd4986b43cf388640e14fb87761119c7b # v2.0.13
      with:
        image_ref: ${{ inputs.image }}@${{ env.DIGEST }}
        sbom: build/reports/cyclonedx/application.cdx.json


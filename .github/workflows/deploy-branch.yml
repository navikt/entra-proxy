name: Build and deploy branch
on:
  pull_request:
    branches:
      - main
env:
  BASE: europe-north1-docker.pkg.dev/cgr-nav/pull-through/nav.no/jre:openjdk-25-dev
  IMAGE: europe-north1-docker.pkg.dev/nais-management-233d/sikkerhetstjenesten/${{ github.event.repository.name }}
jobs:
  build:
    name: build
    permissions:
      checks: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Sjekker ut kode
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          fetch-depth: 0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Install Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: temurin

      - name: Installerer cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.4.1

      - name: Configure Gradle for GPR
        run: |
          mkdir -p ~/.gradle
          echo "gpr.user=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "gpr.key=${{ secrets.GITHUB_TOKEN }}" >> ~/.gradle/gradle.properties          


      - name: Setter tag-navn
        run: echo "TAG=$(date +%Y.%m.%d.%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Login GAR
        uses: nais/login@c88ada9ce583928e1c84d2fd5c45cfacdd18d5de # v0
        with:
          team: sikkerhetstjenesten

      - name: Test og bygg
        id: kompiler
        run: |
          echo "image=${{ env.IMAGE }}:${{ env.TAG }}" >> $GITHUB_OUTPUT          
          ./gradlew --warning-mode all test cyclonedxBom jib -Djib.to.tags=latest,${TAG} -Djib.from.image=${BASE} -Djib.to.image=${{ env.IMAGE }}:${{ env.TAG }}
          echo "DIGEST=$(cat build/jib-image.digest)" >> $GITHUB_ENV
        env:
          ORG_GRADLE_PROJECT_githubUser: x-access-token
          ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5.6.2
        if: always() # always run even if the previous step fails
        with:
          include_time_in_summary: 'true'
          include_passed: 'true'
          detailed_summary: 'true'
          report_paths: '**/build/test-results/test/TEST-*.xml'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Attest and sign
        uses: nais/attest-sign@381d4cf8d769dac9bca014287449cfe812dc79b6 # v1.5.20
        with:
          image_ref: ${{env.IMAGE}}@${{env.DIGEST}}
          sbom:  build/reports/cyclonedx/application.cdx.json

    outputs:
      image: ${{ steps.kompiler.outputs.image }}

  deploy:
    permissions:
      contents: write
      id-token: write
    strategy:
      matrix:
        cluster: [ dev-gcp ]
    name: Deploy til ${{matrix.cluster}}
    needs: build
    runs-on: ubuntu-latest
    environment:
      ${{matrix.cluster}}:sikkerhetstjenesten
    env:
      PRINT_PAYLOAD: true
      TIMEOUT: 30m
      RESOURCE: .nais/naiserator.yaml,.nais/probes.yaml,.nais/probe-alerts.yaml,.nais/serviceintegration.yaml,.nais/alerts.yaml
      CLUSTER: ${{matrix.cluster}}
      VARS: .nais/${{matrix.cluster}}.json
      IMAGE: ${{needs.build.outputs.image}}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 # v2

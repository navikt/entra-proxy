name: Build and deploy
on:
  push:
    branches:
      - main
jobs:
  build:
    env:
      IMAGE: europe-north1-docker.pkg.dev/nais-management-233d/sikkerhetstjenesten/${{ github.event.repository.name }}
      BASE: europe-north1-docker.pkg.dev/cgr-nav/pull-through/nav.no/jre:openjdk-25
    name: build
    permissions:
      checks: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Sjekker ut kode
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Install Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: temurin

      - name: Installer cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.4.1

      - name: Setter tag-navn
        run: echo "TAG=$(date +%Y.%m.%d.%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Login GAR
        uses: nais/login@c88ada9ce583928e1c84d2fd5c45cfacdd18d5de # v0
        with:
          team: sikkerhetstjenesten

      - name: Test og bygg
        id: kompiler
        run: |
          echo "image=${{ env.IMAGE }}:${{ env.TAG }}" >> $GITHUB_OUTPUT          
          ./gradlew --warning-mode all test cyclonedxBom jib jacocoTestReport -Djib.to.tags=latest,${TAG} -Djib.from.image=${BASE} -Djib.to.image=${{ env.IMAGE }}:${{ env.TAG }}
          echo "DIGEST=$(cat build/jib-image.digest)" >> $GITHUB_ENV
        env:
          ORG_GRADLE_PROJECT_githubUser: x-access-token
          ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: always() # always run even if the previous step fails
        with:
          include_time_in_summary: 'true'
          include_passed: 'true'
          detailed_summary: 'true'
          report_paths: '**/build/test-results/test/TEST-*.xml'

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html

      - name: Attest and sign
        uses: nais/attest-sign@381d4cf8d769dac9bca014287449cfe812dc79b6 # v1.5.20
        with:
          image_ref: ${{env.IMAGE}}@${{env.DIGEST}}
          sbom:  build/reports/cyclonedx/application.cdx.json

    outputs:
      image: ${{ steps.kompiler.outputs.image }}

  deploy:
    permissions:
      contents: write
      id-token: write
    strategy:
      matrix:
        cluster: [dev-gcp, prod-gcp]
    name: Deploy til ${{matrix.cluster}}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{matrix.cluster}}:sikkerhetstjenesten
    env:
      PRINT_PAYLOAD: true
      TIMEOUT: 30m
      RESOURCE: .nais/naiserator.yaml,.nais/probes.yaml,.nais/probe-alerts.yaml,.nais/serviceintegration.yaml,.nais/alerts.yaml
      CLUSTER: ${{matrix.cluster}}
      VARS: .nais/${{matrix.cluster}}.json
      IMAGE: ${{needs.build.outputs.image}}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
